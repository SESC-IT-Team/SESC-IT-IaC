global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Метрики самого Prometheus.
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  # Метрики Linux-сервера.
  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100