services:
  loki:
    image: grafana/loki:3.7.0
    container_name: loki
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - logging
    expose:
      - "3100"

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./alloy-config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - logging
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - logging
    expose:
      - "9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}

      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN}
      GF_SERVER_ROOT_URL: "https://${GRAFANA_DOMAIN}"
      GF_SERVER_PROTOCOL: "http"

      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"

    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - logging
      - traefik-public
    depends_on:
      - loki
      - prometheus
    labels:

      traefik.enable: "true"

      traefik.http.routers.grafana.rule: "Host(`${GRAFANA_DOMAIN}`)"
      traefik.http.routers.grafana.entrypoints: "web"
      traefik.http.routers.grafana.middlewares: "grafana-https-redirect"

      traefik.http.middlewares.grafana-https-redirect.redirectscheme.scheme: "https"
      traefik.http.middlewares.grafana-https-redirect.redirectscheme.permanent: "true"

      traefik.http.routers.grafana-secure.rule: "Host(`${GRAFANA_DOMAIN}`)"
      traefik.http.routers.grafana-secure.entrypoints: "websecure"
      traefik.http.routers.grafana-secure.tls: "true"
      traefik.http.routers.grafana-secure.tls.certresolver: "${TLS_RESOLVER:-letsencrypt}"
      traefik.http.routers.grafana-secure.service: "grafana"

      traefik.http.services.grafana.loadbalancer.server.port: "3000"
      traefik.docker.network: "traefik-public"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    networks:
      - logging
    expose:
      - "9100"

volumes:
  loki-data:
  alloy-data:
  prometheus-data:
  grafana-data:

networks:
  logging:
    name: logging
  traefik-public:
    external: true
    name: traefik-public