services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio-server
    command: server /data --console-address ":9001"
    restart: unless-stopped

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_REGION: ${MINIO_REGION}
      MINIO_SERVER_URL: https://s3.sesc-it-team.ru
      MINIO_BROWSER_REDIRECT_URL: https://minio.sesc-it-team.ru

    volumes:
      - minio-data:/data

    expose:
      - "9000"
      - "9001"

    networks:
      - traefik-public

    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public

      # S3 API
      - traefik.http.routers.minio-api.rule=Host(`s3.sesc-it-team.ru`)
      - traefik.http.routers.minio-api.entrypoints=websecure
      - traefik.http.routers.minio-api.tls=true
      - traefik.http.routers.minio-api.tls.certresolver=letsencrypt
      - traefik.http.routers.minio-api.service=minio-api
      - traefik.http.services.minio-api.loadbalancer.server.port=9000

      # MinIO Console
      - traefik.http.routers.minio-console.rule=Host(`minio.sesc-it-team.ru`)
      - traefik.http.routers.minio-console.entrypoints=websecure
      - traefik.http.routers.minio-console.tls=true
      - traefik.http.routers.minio-console.tls.certresolver=letsencrypt
      - traefik.http.routers.minio-console.service=minio-console
      - traefik.http.services.minio-console.loadbalancer.server.port=9001

volumes:
  minio-data:
    driver: local

networks:
  traefik-public:
    external: true
    name: traefik-public