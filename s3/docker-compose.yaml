services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio-server
    command: server /data --console-address ":9001"
    restart: unless-stopped

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_REGION: ${MINIO_REGION}
      MINIO_SERVER_URL: https://${S3_DOMAIN}
      MINIO_BROWSER_REDIRECT_URL: https://${DOMAIN}/minio

    volumes:
      - minio-data:/data

    expose:
      - "9000"
      - "9001"

    networks:
      - traefik-public

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"

      - "traefik.http.routers.minio-api.rule=Host(`${S3_DOMAIN}`)"
      - "traefik.http.routers.minio-api.entrypoints=websecure"
      - "traefik.http.routers.minio-api.tls=true"
      - "traefik.http.routers.minio-api.service=minio-api"
      - "traefik.http.services.minio-api.loadbalancer.server.port=9000"

      - "traefik.http.routers.minio-console.rule=Host(`${DOMAIN}`) && PathPrefix(`/minio`)"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls=true"
      - "traefik.http.routers.minio-console.service=minio-console"
      - "traefik.http.routers.minio-console.middlewares=minio-console-stripprefix,minio-console-slash"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"

      - "traefik.http.middlewares.minio-console-slash.redirectregex.regex=^https://${DOMAIN_ESCAPED}/minio$"
      - "traefik.http.middlewares.minio-console-slash.redirectregex.replacement=https://${DOMAIN}/minio/"
      - "traefik.http.middlewares.minio-console-slash.redirectregex.permanent=true"

      - "traefik.http.middlewares.minio-console-stripprefix.stripprefix.prefixes=/minio"

      - "traefik.http.routers.minio-api-http.rule=Host(`${S3_DOMAIN}`)"
      - "traefik.http.routers.minio-api-http.entrypoints=web"
      - "traefik.http.routers.minio-api-http.service=minio-api"

      - "traefik.http.routers.minio-console-http.rule=Host(`${DOMAIN}`) && PathPrefix(`/minio`)"
      - "traefik.http.routers.minio-console-http.entrypoints=web"
      - "traefik.http.routers.minio-console-http.service=minio-console"
      - "traefik.http.routers.minio-console-http.middlewares=minio-console-stripprefix,minio-console-slash"

volumes:
  minio-data:
    driver: local

networks:
  traefik-public:
    external: true
    name: traefik-public