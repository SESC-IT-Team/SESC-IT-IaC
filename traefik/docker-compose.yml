services:
  traefik:
    image: traefik:v3.6.13
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml
      - ./dynamic:/etc/traefik/dynamic:ro
      - traefik-certs:/certs
    networks:
      - traefik-public
    env_file:
      - .env

networks:
  traefik-public:
    external: true
    name: traefik-public

volumes:
  traefik-certs: