entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

api:
  dashboard: true
  insecure: false # для локального тестирования - true (для прода - false)

providers:
  docker:
    exposedByDefault: false
  file:
    directory: /etc/traefik/dynamic
    watch: true

log:
  level: INFO

certificatesResolvers:
  letsencrypt:
    acme:
      email: "email@example.com"
      storage: "/acme.json"
      httpChallenge:
        entryPoint: web
