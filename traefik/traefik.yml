entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"

api:
  dashboard: true
  insecure: false

providers:
  docker:
    exposedByDefault: false
    network: traefik-public
  file:
    directory: /etc/traefik/dynamic
    watch: true

log:
  level: INFO

certificatesResolvers:
  letsencrypt:
    acme:
      email: "email@gmail.com"
      storage: "/acme.json"
      httpChallenge:
        entryPoint: web