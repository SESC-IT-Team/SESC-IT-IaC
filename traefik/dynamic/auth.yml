http:
  routers:
    auth:
      rule: localhost

       # "Host(`sesc-it-team.ru`)"
      service: auth
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

  services:
    auth:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:8000

         # "http://auth-api:8000"

#          "http://host.docker.internal:8000"  # для локального dev
#
#          или "http://auth-api:8000" если в Docker сети

  middlewares:
    auth-redirect:
      redirectScheme:
        scheme: https
        permanent: true
