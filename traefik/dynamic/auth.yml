http:
  routers:
    auth:
      rule: "Host(`sesc-it-team.ru`)"
      service: auth
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

  services:
    auth:
      loadBalancer:
        servers:
          - url: "http://auth-api:8000"

         # "http://host.docker.internal:8000"
         # или "http://auth-api:8000" если Traefik и auth-api в одной Docker-сети

  middlewares:
    auth-redirect:
      redirectScheme:
        scheme: https
        permanent: true